name: 'Docker build and push'
description: 'Simple Docker build and push action'
author: hello@cloudposse.com
branding:
  icon: 'box'
  color: 'white'
inputs:
  allow:
    description: "List of extra privileged entitlement (e.g., network.host,security.insecure)"
    required: false
  network:
    description: "Set the networking mode for the RUN instructions during build"
    required: false
  build-contexts:
    description: "List of additional build contexts (e.g., name=path)"
    required: false
  buildkitd-flags:
    description: 'BuildKit daemon flags'
    default: '--allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host'
    required: false
  driver-opts:
    description: 'List of additional driver-specific options. (eg. image=moby/buildkit:master)'
    required: false
    default: image=public.ecr.aws/vend/moby/buildkit:buildx-stable-1
  binfmt-image:
    description: 'Binfmt image'
    required: false
    default: public.ecr.aws/eks-distro-build-tooling/binfmt-misc:qemu-v7.0.0
  workdir:
    description: 'Working directory'
    required: false
    default: './'
  file:
    description: 'Dockerfile name'
    required: false
    default: 'Dockerfile'
  build-args:
    description: "List of build-time variables"
    required: false
  organization:
    description: 'Organization'
    required: true
  repository:
    description: 'Repository'
    required: true
  registry:
    description: 'Docker registry'
    required: true
  target:
    description: "Sets the target stage to build"
    required: false
    default: ''
  platforms:
    description: "List of target platforms for build (e.g. linux/amd64,linux/arm64,linux/riscv64,linux/ppc64le,linux/s390x,etc)"
    required: false
    default: 'linux/amd64'
  provenance:
    description: "Generate provenance attestation for the build"
    required: false
  image_name:
    description: "Image name (excluding registry). Defaults to {{$organization/$repository}}."
    required: false
    default: ''
  login:
    description: 'Docker login'
    required: false
    default: ''
  password:
    description: 'Docker password'
    required: false
    default: ''
  cache-from:
    description: "List of external cache sources for buildx (e.g., user/app:cache, type=local,src=path/to/dir)"
    required: false
    default: type=gha
  cache-to:
    description: "List of cache export destinations for buildx (e.g., user/app:cache, type=local,dest=path/to/dir)"
    required: false
    default: type=gha,mode=max
  no-cache:
    description: "Send the --no-cache flag to the docker build process"
    required: false
    default: "false"
  ssh:
    description: "List of SSH agent socket or keys to expose to the build"
    required: false
  tags:
    description: "List of tags (supports https://github.com/docker/metadata-action#tags-input)"
    required: false
  secrets:
    description: "List of secrets to expose to the build (e.g., key=string, GIT_AUTH_TOKEN=mytoken)"
    required: false
  secret-files:
    description: "List of secret files to expose to the build (e.g., key=filename, MY_SECRET=./secret.txt)"
    required: false
  docker-metadata-pr-head-sha:
    description: "Set to `true` to tag images with the PR HEAD SHA instead of the merge commit SHA within pull requests."
    required: false
    default: "false"
  inspect:
    description: "Set to `true` will pull and inspect the image and output it to the step summary."
    required: false
    default: "false"
  debug:
    description: "Enable debug mode"
    required: false
    default: "false"
  force:
    description: "Force install jq"
    required: false
    default: "true"
outputs:
  image:
    description: "Docker image name"
    value: ${{ inputs.registry }}/${{ steps.image_name.outputs.image_name }}
  tag:
    description: "Docker image tag"
    value: ${{ steps.tag.outputs.output }}
  metadata:
    description: "Docker image metadata"
    value: ${{ steps.get-metadata.outputs.metadata }}

runs:
  using: "composite"
  steps:
    - name: Set image name
      id: image_name
      shell: bash
      run: |
        if [ "${{ inputs.image_name }}" = "" ]; then
          echo 'image_name=${{ inputs.organization }}/${{ inputs.repository }}' >> "$GITHUB_OUTPUT"
        else
          echo 'image_name=${{inputs.image_name}}' >> "$GITHUB_OUTPUT"
        fi
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      env:
        # Annoyingly, docker computes the SHA tags independently of any checkout
        # action. This option tells this action to use the PR HEAD SHA during a
        # pull request. It will then use `github.event.pull_request.head.sha`
        # instead of the merge commit (`github.sha`). This is useful for folks
        # who want to avoid merge commits in their PRs (for hotfix workflows,
        # tag predictability, builds on merge-conflicts, etc).
        DOCKER_METADATA_PR_HEAD_SHA: ${{ inputs.docker-metadata-pr-head-sha }}
      with:
        # list of Docker images to use as base name for tags
        images: |
          ${{ inputs.registry }}/${{ steps.image_name.outputs.image_name }}
        # generate Docker tags based on the following events/attributes
        # we set sha as higher priority than the defaults, so that it is the first tag
        tags: |
          type=sha
          type=schedule
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,format=long,priority=1001
          ${{ inputs.tags }}
        labels: |
          org.opencontainers.image.source=https://github.com/${{ inputs.organization }}/${{ inputs.repository }}

    - name: 'Install jq 1.6'
      uses: dcarbone/install-jq-action@v3.2.0
      with:
        version: 1.6
        force: ${{ inputs.force }}

    # here we set the first tag in the output as the output of this step
    # this order is determined by the priority, we set the sha as 1001, as that is 1 above the defaults
    # If a custom tag is added we can add a priority higher than that to set that as the output.
    # https://github.com/docker/metadata-action#priority-attribute
    # this formula is, of the tags, grab the first (highest priority), then split by : for the tag, grab the tag (last element)
    - uses: cloudposse/github-action-jq@0.4.0
      id: tag
      with:
        compact: true
        raw-output: true
        input: ${{ steps.meta.outputs.json }}
        script: '.tags | ( first / ":") | .[length -1]'

    # docker context must be created prior to setting up Docker Buildx
    # https://github.com/actions-runner-controller/actions-runner-controller/issues/893
    - name: Set up Docker Context for Buildx
      shell: bash
      id: buildx-context
      run: |
        docker context create buildx-context || true

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        image: ${{ inputs.binfmt-image }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        endpoint: buildx-context
        buildkitd-flags: "${{ inputs.debug == 'true' && '--debug' || '' }} ${{ inputs.buildkitd-flags }}" 
        driver-opts: "${{ inputs.driver-opts }}"

    - name: Login
      uses: docker/login-action@v3
      if: ${{ contains(inputs.registry, '.amazonaws.com') || ( inputs.login != '' && inputs.password != '' ) }}
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.login }}
        password: ${{ inputs.password }}


    # Replaces docker/build-push-action@v5 with a direct `docker buildx build --push`
    # invocation wrapped in a throttle-aware retry loop. ECR's PutImage TPS limits
    # cause "toomanyrequests: Rate exceeded" failures when many matrix jobs push
    # simultaneously; this loop detects only those errors (not real build failures)
    # and retries with exponential backoff + jitter to avoid thundering-herd retries.
    #
    # Inputs are passed via env: rather than inline ${{ }} expansion to prevent shell
    # injection from arbitrary user-supplied values (tags, labels, build-args, etc.).
    - name: Build and push Docker images (throttle-aware retry)
      id: docker-build-push-action
      shell: bash
      env:
        IN_ALLOW: ${{ inputs.allow }}
        IN_NETWORK: ${{ inputs.network }}
        IN_WORKDIR: ${{ inputs.workdir }}
        IN_FILE: ${{ inputs.file }}
        IN_SSH: ${{ inputs.ssh }}
        IN_BUILD_ARGS: ${{ inputs.build-args }}
        IN_BUILD_CONTEXTS: ${{ inputs.build-contexts }}
        IN_CACHE_FROM: ${{ inputs.cache-from }}
        IN_CACHE_TO: ${{ inputs.cache-to }}
        IN_NO_CACHE: ${{ inputs.no-cache }}
        IN_TAGS: ${{ steps.meta.outputs.tags }}
        IN_TARGET: ${{ inputs.target }}
        IN_LABELS: ${{ steps.meta.outputs.labels }}
        IN_PLATFORMS: ${{ inputs.platforms }}
        IN_PROVENANCE: ${{ inputs.provenance }}
        IN_SECRETS: ${{ inputs.secrets }}
        IN_SECRET_FILES: ${{ inputs.secret-files }}
      run: |
        set -uo pipefail

        metadata_file="$(mktemp -t buildx-metadata.XXXXXX.json)"
        args=(buildx build --pull --push --metadata-file "$metadata_file")

        # Append `--flag VALUE` for each non-empty newline-delimited entry.
        add_repeated() {
          local flag="$1" value="$2"
          [ -z "$value" ] && return 0
          while IFS= read -r line; do
            [ -n "$line" ] && args+=("$flag" "$line")
          done <<< "$value"
        }

        # Append `--flag VALUE` if value is non-empty.
        add_single() {
          local flag="$1" value="$2"
          [ -n "$value" ] && args+=("$flag" "$value")
        }

        add_repeated --allow         "$IN_ALLOW"
        add_single   --network       "$IN_NETWORK"
        add_single   --file          "$IN_WORKDIR/$IN_FILE"
        add_single   --ssh           "$IN_SSH"
        add_repeated --build-arg     "$IN_BUILD_ARGS"
        add_repeated --build-context "$IN_BUILD_CONTEXTS"
        add_repeated --cache-from    "$IN_CACHE_FROM"
        add_repeated --cache-to      "$IN_CACHE_TO"
        [ "$IN_NO_CACHE" = "true" ] && args+=(--no-cache)
        add_repeated --tag           "$IN_TAGS"
        add_single   --target        "$IN_TARGET"
        add_repeated --label         "$IN_LABELS"
        add_single   --platform      "$IN_PLATFORMS"
        # provenance uses --flag=VALUE form so `false` is parsed as a boolean.
        [ -n "$IN_PROVENANCE" ] && args+=("--provenance=$IN_PROVENANCE")

        # Secrets: each `KEY=VALUE` line becomes an env-backed buildkit secret
        # (kept out of process args / docker history). Multi-line secret values
        # are not supported here; use secret-files for those.
        if [ -n "$IN_SECRETS" ]; then
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            key="${line%%=*}"
            value="${line#*=}"
            envname="BUILDX_SECRET_${key}"
            export "$envname=$value"
            args+=(--secret "id=${key},env=${envname}")
          done <<< "$IN_SECRETS"
        fi

        if [ -n "$IN_SECRET_FILES" ]; then
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            key="${line%%=*}"
            path="${line#*=}"
            args+=(--secret "id=${key},src=${path}")
          done <<< "$IN_SECRET_FILES"
        fi

        args+=("$IN_WORKDIR")

        max_attempts=4
        base_delay=15
        attempt=1

        while : ; do
          log="$(mktemp)"
          echo "::group::buildx attempt ${attempt}/${max_attempts}"
          docker "${args[@]}" 2>&1 | tee "$log"
          rc=${PIPESTATUS[0]}
          echo "::endgroup::"

          if [ "$rc" -eq 0 ]; then
            break
          fi

          # Only retry registry throttling. Real build errors fail fast.
          if ! grep -qiE "toomanyrequests|rate exceeded|throttl" "$log"; then
            echo "::error::buildx failed (rc=$rc); error is not a registry throttle, not retrying."
            exit "$rc"
          fi

          if [ "$attempt" -ge "$max_attempts" ]; then
            echo "::error::ECR throttling persisted after ${max_attempts} attempts."
            exit "$rc"
          fi

          # Exponential backoff (15s, 30s, 60s, ...) plus 0-29s jitter to
          # desynchronize concurrent matrix-job retries.
          delay=$(( base_delay * (2 ** (attempt - 1)) ))
          jitter=$(( RANDOM % 30 ))
          total=$(( delay + jitter ))
          echo "::warning::ECR throttled — sleeping ${total}s before retry $((attempt + 1))/${max_attempts}."
          sleep "$total"
          attempt=$(( attempt + 1 ))
        done

        # Emit the same outputs docker/build-push-action would have, so the
        # downstream "Get Metadata" step (which keys off this step's id) is
        # unaffected.
        echo "metadata-file=$metadata_file" >> "$GITHUB_OUTPUT"
        {
          echo 'metadata<<BUILDX_METADATA_EOF'
          cat "$metadata_file"
          echo
          echo 'BUILDX_METADATA_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Get Metadata
      id: get-metadata
      shell: bash
      run: |
        set -euo pipefail

        # Prefer the metadata file emitted by docker/build-push-action (avoids shell quoting pitfalls).
        metadata_file="${{ steps.docker-build-push-action.outputs.metadata-file }}"

        # Some buildx versions omit metadata-file; fall back to the raw output, but
        # write it to a temp file via heredoc so embedded quotes/newlines cannot
        # break shell parsing.
        if [ -z "$metadata_file" ] || [ ! -f "$metadata_file" ]; then
        metadata_file="$(mktemp)"
        cat <<'EOF' > "$metadata_file"
        ${{ steps.docker-build-push-action.outputs.metadata }}
        EOF
        fi

        metadata=$(jq -c . "$metadata_file")

        echo "metadata=$metadata" >> "$GITHUB_OUTPUT"
        echo "## Docker Image Metadata" >> "$GITHUB_STEP_SUMMARY"
        echo '```json' >> "$GITHUB_STEP_SUMMARY"
        echo "$metadata" | jq >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"

    - name: Docker Inspect
      id: inspect
      if:  ${{ inputs.inspect }} == 'true'
      shell: bash
      run: |
        docker pull "${{ inputs.registry }}/${{ steps.image_name.outputs.image_name }}:${{ steps.tag.outputs.output }}"
        docker inspect "${{ inputs.registry }}/${{ steps.image_name.outputs.image_name }}:${{ steps.tag.outputs.output }}" > inspect.json
        metadata=$(jq -c < inspect.json)
        echo "metadata=$metadata" >> $GITHUB_OUTPUT
        echo "## Docker Image Inspect" >> $GITHUB_STEP_SUMMARY
        echo '```json' >> $GITHUB_STEP_SUMMARY
        cat inspect.json >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
